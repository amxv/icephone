name = "icephone-document-ingestion-worker"
main = "src/index.ts"
compatibility_date = "2024-04-19"
compatibility_flags = ["nodejs_compat"]

[env.development]
vars = { ENVIRONMENT = "development" }

[env.production]
vars = { ENVIRONMENT = "production" }

# Environment variables (to be set via wrangler secret)
# NEON_DATABASE_URL
# VOYAGE_API_KEY
# OPENAI_API_KEY
# INGESTION_WORKER_AUTH_TOKEN

# Optional R2 bucket for file storage
# [[r2_buckets]]
# binding = "DOCUMENTS_R2_BUCKET"
# bucket_name = "icephone-documents"

# Optional KV namespace for caching
# [[kv_namespaces]]
# binding = "EMBEDDINGS_CACHE"
# id = "your-kv-namespace-id"
# preview_id = "your-preview-kv-namespace-id"